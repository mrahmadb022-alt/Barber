<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Elite Grooming</title>
    <style>
        /* Base Styles */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #121212;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            color: white;
        }

        /* Splash Screen Overlay */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOutScreen 0.8s ease-in-out 2.8s forwards;
        }

        /* Logo Animation: Pop and then fly to corner */
        .splash-logo {
            width: 180px; /* Adjust size to your logo */
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.5));
            animation: popAndFly 2.5s ease-in-out forwards;
        }

        @keyframes popAndFly {
            0% { transform: scale(0); opacity: 0; }
            30% { transform: scale(1.1); opacity: 1; }
            50% { transform: scale(1); opacity: 1; }
            100% { 
                /* Moves it toward the top corner and shrinks it */
                transform: translate(-35vw, -40vh) scale(0.4); 
                opacity: 0; 
            }
        }

        @keyframes fadeOutScreen {
            from { opacity: 1; }
            to { opacity: 0; visibility: hidden; }
        }

        /* Main Dashboard Container */
        .dashboard-container {
            opacity: 0;
            animation: fadeInContent 1s ease-in-out 3s forwards;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        @keyframes fadeInContent {
            to { opacity: 1; }
        }

        /* Responsive Dashboard Grid */
        .portal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 50px;
        }

        .portal-card {
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .client-portal { background: #D4AF37; color: #000; }
        .barber-portal { background: #2a2a2a; border: 1px solid #D4AF37; }

        /* Phone Friendly Adjustments */
        @media (max-width: 768px) {
            .portal-grid {
                grid-template-columns: 1fr; /* Stacks vertically on mobile */
            }
            .splash-logo {
                width: 140px;
            }
            @keyframes popAndFly {
                0% { transform: scale(0); opacity: 0; }
                30% { transform: scale(1.1); opacity: 1; }
                100% { 
                    transform: translate(-25vw, -42vh) scale(0.35); 
                    opacity: 0; 
                }
            }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://via.placeholder.com/200x200/D4AF37/000000?text=SOVEREIGN" alt="Sovereign Logo" class="splash-logo">
    </div>

    <div class="dashboard-container">
        <header style="text-align: center;">
            <h1 style="color: #D4AF37;">SOVEREIGN</h1>
            <p>Elite Grooming Dashboard</p>
        </header>

        <div class="portal-grid">
            <div class="portal-card client-portal">
                <h2>CLIENT PORTAL</h2>
                <p>Book your next session</p>
            </div>
            <div class="portal-card barber-portal">
                <h2>BARBER LOGIN</h2>
                <p>Manage your schedule</p>
            </div>
        </div>
    </div>

</body>
</html>
